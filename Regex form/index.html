<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User data</title>
    <link rel="stylesheet" href="./style.css">
    
</head>
<body>
    <h1 class="headding">User <span>data</span></h1>

    <form id="userdata">
        <div class="signup">
            <div>
                <label>Username :</label>
                <input type="text" id="name" placeholder="Enter Name" class="signupName" required >
            </div>
    
            <div>
                <label>E-mail :</label>
                <input type="text" id="email" placeholder="Enter email" class="signupName" required>
            </div>
    
            <div>
                <label>Number :</label>
                <input type="number" id="number" placeholder="Enter Number" class="signupName" required>
            </div>
    
            <div>
                <label>Password :</label>
                <input type="password" id="password" placeholder="Enter Password" class="signupName" required>
            </div>

            <div class="cours">
                <label type>Select course :</label>

                <input type="checkbox" name="course" value="html" id="course"  class="signupName"  >
                <label >Fullstack</label>
 
                <input type="checkbox" name="course" value="css" id="course"  class="signupName"  >
                <label>Flutter</label><br>

                <input type="checkbox" name="course" value="js" id="course"  class="signupName"  >
                <label>front-end</label>

                <input type="checkbox" name="course" value="bt" id="course"  class="signupName"  >
                <label>Ai-Ml</label>

            </div>
             <div class="gender">
                <label>gender :</label>
                <input value="male" name="question" type="radio" id="male"  class="signupName" required>
                <label >male</label>

                <input value="female" name="question" type="radio" id="female"  class="signupName" required>
                <label >female</label>

            <div>

            </div>
    
            <div class="Submit">
                <input type="Submit" class="btn">
            </div>
    
            
    
            
        </div>
    </form>

    <script src="./JS/script.js"></script>
</body>
</html>
